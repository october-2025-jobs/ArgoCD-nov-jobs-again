---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vic-deploy
  namespace: vic-ns
spec:
  selector:
    matchLabels:
      app: myapp
  replicas: 6
  template:
    metadata:
      labels:
        app: myapp
    spec:
      containers:
      - name: vic-container
        image: nginx:1.26.3
        ports:
        - containerPort: 80

