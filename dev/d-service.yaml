
---
apiVersion: v1
kind: Service
metadata:
  name: vic-svc
  namespace: vic-ns
  labels:
    app: my-app
spec:
  type: ClusterIP
  selector:
    app: myapp
  ports:
    - protocol: TCP
      port: 2900
      targetPort: 80

